# Sector Rotation Strategy / 板块轮动策略
# Track sector capital flow and ranking changes to identify rotation opportunities.

name: sector_rotation
display_name: 板块轮动
description: 追踪板块资金流向与涨跌排名变化，识别板块轮动中的介入时机。
category: trend
core_rules: [2, 3, 7]
required_tools:
