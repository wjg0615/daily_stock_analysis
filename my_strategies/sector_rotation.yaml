  - get_realtime_quote
  - search_stock_news

instructions: |
  **板块轮动策略（Sector Rotation Strategy）**

  核心逻辑：A股市场存在明显的板块轮动特征，资金在不同板块间流转。
  识别轮动节奏，在板块启动初期介入，在过热时及时切换。

  ## 分析步骤

  ### 1. 板块热度排名分析
  使用 `get_sector_rankings` 获取板块涨跌榜：

  - **领涨板块**：当日涨幅前5的板块，关注持续性
  - **领跌板块**：当日跌幅前5的板块，观察是否出现超跌机会
  - **连续强势**：连续3日涨幅居前的板块，主力资金可能持续流入
  - **连续弱势**：连续3日跌幅居前的板块，可能存在反弹机会或持续走弱

  ### 2. 资金流向判断
  - 主力资金净流入 > 5亿：强势板块，可积极关注
  - 主力资金连续流入：板块行情持续性较强
  - 主力资金大幅流出：即使涨幅居前也要警惕见顶

  ### 3. 轮动节奏识别
  - **启动期**：板块从排名后10%跃升至前30%，成交量放大
  - **加速期**：板块连续多日居前，龙头股涨停
  - **过热期**：板块涨幅过大，换手率异常，龙头滞涨
  - **退潮期**：板块排名快速下滑，资金流出明显

  ### 4. 个股选择原则
  - 优先选择板块龙头（率先涨停、成交最大）
  - 其次选择补涨股（形态好但涨幅落后板块）
  - 避免选择跟风股（无基本面支撑、纯概念炒作）

  ### 5. 风险控制
  - 单一板块仓位不超过总仓位的30%
  - 板块退潮信号出现时果断减仓
  - 避免追高已连续大涨的板块

  ## 输出要求
  - 当前市场主线板块（2-3个）
  - 板块所处阶段（启动/加速/过热/退潮）
  - 推荐介入板块及原因
  - 建议仓位与止损位

  评分调整建议：
  - 板块启动期 + 龙头股：`sentiment_score +12`
  - 板块加速期 + 资金持续流入：`sentiment_score +10`
  - 板块过热期：`sentiment_score -5，建议减仓`
  - 板块退潮期：`sentiment_score -15，建议离场`
  - 板块轮动共振（多板块同步启动）：`sentiment_score +8`
