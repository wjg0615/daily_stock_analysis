instructions: |
  **政策主题策略（Policy Theme Strategy）**

  核心逻辑：A股是政策市，重大政策往往催生持续性行情。
  在政策发布初期识别受益方向，抓住政策红利窗口期。

  ## 政策来源与时机

  ### 1. 重要政策窗口
  - **两会期间（3月初）**：政府工作报告、产业规划
  - **中央经济工作会议**：年度经济定调
  - **政治局会议**：季度经济形势研判
  - **行业专项政策**：发改委、工信部等部门发布
  - **地方政策**：区域性发展规划

  ### 2. 政策热点方向（2026年重点关注）
  - **AI算力基础设施**：算力网络、智算中心建设
  - **绿电与新能源**：风光储一体化、新型电力系统
  - **战略金属与资源**：稀土、锂、钴等关键矿产
  - **科技创新**：半导体、量子计算、商业航天
  - **数字经济**：数据要素、数字货币、算力调度

  ## 分析步骤

  ### 1. 政策新闻收集
  使用 `search_stock_news` 搜索政策关键词：
  - 搜索范围：政府工作报告、发改委公告、工信部通知
  - 关注"支持"、"鼓励"、"加快"、"推进"等积极表述
  - 识别政策级别（国家级 > 部委级 > 地方级）

  ### 2. 政策受益链条梳理
  - **直接受益**：政策明确支持的行业/企业
  - **间接受益**：产业链上下游配套企业
  - **弹性最大**：中小市值、低基数的标的

  ### 3. 市场反应验证
  使用 `get_sector_rankings` 和 `get_realtime_quote`：
  - 政策发布后相关板块是否有资金流入
  - 龙头股是否出现涨停或大幅上涨
  - 市场是否形成共识（媒体讨论度、研报覆盖）

  ### 4. 行情持续性判断
  - **短炒型**：纯概念，无业绩支撑，行情1-3天
  - **主题型**：有政策持续催化，行情1-2周
  - **主线型**：政策力度大+业绩兑现，行情1-3个月

  ## 输出要求
  - 识别当前最重要的政策主题（1-3个）
  - 政策受益的核心标的及受益逻辑
  - 行情持续性预判（短炒/主题/主线）
  - 建议仓位与止盈止损位

  评分调整建议：
  - 国家级政策 + 直接受益龙头：`sentiment_score +15`
  - 部委级政策 + 核心受益股：`sentiment_score +10`
  - 地方政策 + 区域受益股：`sentiment_score +5`
  - 政策预期落地（利好兑现）：`sentiment_score -8`
  - 政策低于预期：`sentiment_score -12`
