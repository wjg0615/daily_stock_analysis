# High Dividend Defensive Strategy / 高股息防御策略
# Focus on high-yield, low-valuation stocks for defensive positioning in uncertain markets.

name: high_dividend
display_name: 高股息防御
description: 筛选高股息、低估值的防御性标的，适用于市场不确定性较高时避险配置。
category: framework
core_rules: [1, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - search_stock_news

instructions: |
  **高股息防御策略（High Dividend Defensive Strategy）**

  核心逻辑：在市场震荡或不确定性较高时，高股息资产提供"安全垫"。
  股息收益+估值修复构成双重收益来源，降低组合波动。

  ## 适用场景

  ### 1. 市场环境判断
  - 指数处于震荡或下行趋势
  - 外部风险事件增多（地缘政治、海外波动）
  - 成长股估值过高，性价比下降
  - 市场情绪偏谨慎，成交量萎缩

  ### 2. 不适用场景
  - 市场处于快速上涨期，成长股主导
  - 流动性极度宽松，市场偏好高风险资产

  ## 选股标准

  ### 1. 股息率要求
  - **核心标准**：股息率 >= 4%
  - **优选标准**：股息率 >= 5%
  - **极品标准**：股息率 >= 6% + 分红稳定性

  ### 2. 估值要求
  - PE < 15倍（周期股可放宽至20倍）
  - PB < 2倍（银行股可放宽至1倍附近）
  - 股息支付率 < 70%（保证分红可持续）

  ### 3. 分红稳定性
  - 连续分红 >= 3年
  - 股息率波动较小，无大起大落
  - 现金流充足，足以支撑分红

  ### 4. 行业分布
  - **银行**：高股息代表，股息率普遍5-7%
  - **公用事业**：电力、水务，现金流稳定
  - **能源**：石油、煤炭，周期性高股息
  - **交通运输**：高速公路、港口
  - **地产基建**：部分央企地产、建筑

  ## 分析步骤

  ### 1. 基本面筛选
  使用 `search_stock_news` 搜索股息相关信息：
  - 查询最近年度分红方案
  - 确认分红稳定性和可持续性
  - 排查是否存在削减分红风险

  ### 2. 技术面分析
  使用 `get_daily_history` 和 `analyze_trend`：
  - 股价处于相对低位，有安全边际
  - 均线排列平稳，无明显下跌趋势
  - 成交量萎缩，筹码趋于稳定

  ### 3. 买入时机
  - 除权除息前后（填权行情）
  - 股价回调至支撑位附近
  - 市场恐慌性下跌时低吸

  ## 风险提示
  - 周期股高股息可能不可持续（如煤炭、钢铁）
  - 高股息可能是股价下跌导致，需区分情况
  - 利率上行期，高股息相对优势下降

  ## 输出要求
  - 当前市场是否适合高股息策略
  - 符合标准的高股息标的列表（3-5个）
  - 每只标的的股息率、PE、分红稳定性
  - 建议配置比例与买入价位

  评分调整建议：
  - 股息率 >= 5% + 估值低位：`sentiment_score +10`
  - 股息率 >= 6% + 分红连续5年+：`sentiment_score +12`
  - 股息率 < 3% 或 分红不稳定：`不符合策略条件`
  - 市场避险情绪上升：高股息策略整体加分 `+5`
  - 市场风险偏好上升：高股息策略整体减分 `-3`
